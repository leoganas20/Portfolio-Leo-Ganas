name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Publish App
        run: dotnet publish Leo.Project.Portfolio.Web/Leo.Project.Portfolio.Web.csproj -c Release -o release

      - name: Fix base-href and SPA routing
        run: |
          # Change base href to repo name for sub-path hosting
          sed -i 's/<base href="\/" \/>/<base href="\/Leo.Project.Portfolio.Web\/" \/>/g' release/wwwroot/index.html
          # Copy index to 404 for SPA routing fallback on GitHub Pages
          cp release/wwwroot/index.html release/wwwroot/404.html
          # Prevent GitHub from ignoring Jekyll folders
          touch release/wwwroot/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages
